name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Archive binary
        run: |
          mkdir -p dist
          cp .build/release/lumen dist/lumen
          tar -czf "dist/lumen-${GITHUB_REF_NAME}-macos.tar.gz" -C dist lumen
          shasum -a 256 "dist/lumen-${GITHUB_REF_NAME}-macos.tar.gz" > "dist/lumen-${GITHUB_REF_NAME}-macos.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/lumen-${{ github.ref_name }}-macos.tar.gz
            dist/lumen-${{ github.ref_name }}-macos.tar.gz.sha256
